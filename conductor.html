<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moto Express - Conductor</title>
    
    <!-- Leaflet CSS para el mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .phone-container { width: 100%; max-width: 400px; background: #fff; height: 100vh; max-height: 800px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .header { background-color: #1f2937; color: white; padding: 20px; text-align: center; flex-shrink: 0; }
        .header h1 { font-size: 1.4rem; }
        .header p { font-size: 0.85rem; color: #10b981; }
        
        .content { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .trip-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .trip-header { display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #d1fae5; color: #065f46; font-size: 0.75rem; font-weight: bold; padding: 4px 8px; border-radius: 6px; }
        
        #driver-map { height: 220px; width: 100%; border-radius: 12px; border: 1px solid #d1d5db; flex-shrink: 0; margin-top: 10px; }
        
        .btn-accept { background-color: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-gps { background-color: #3b82f6; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; text-decoration: none; text-align: center; display: block; box-sizing: border-box; }
        .btn-finish { background-color: #ef4444; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header">
        <h1>Moto Express</h1>
        <p>Panel de Conductor</p>
    </div>

    <div class="content" id="trips-container">
        <p style="text-align: center; color: #6b7280;">Buscando solicitudes en Santa Ana...</p>
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCCnHDJlsuxxvwpiuNlmRYXKskyZVkyO3A",
      authDomain: "appmoto-5ea5c.firebaseapp.com",
      projectId: "appmoto-5ea5c",
      storageBucket: "appmoto-5ea5c.firebasestorage.app",
      messagingSenderId: "172166379623",
      appId: "1:172166379623:web:4b3ec6c8bc3aacd26d3cc2",
      measurementId: "G-JT7NSCX09V"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Datos del conductor actual (puedes cambiarlos por un login más adelante)
    const miPerfil = {
        nombre: "Carlos Pérez",
        placa: "AB1C23D"
    };

    let activeMap = null;

    // Escuchar carreras pendientes
    const q = query(collection(db, "viajes"), where("estado", "==", "PENDIENTE"));

    onSnapshot(q, (snapshot) => {
        const container = document.getElementById('trips-container');
        container.innerHTML = '';

        if (snapshot.empty) {
            container.innerHTML = '<p style="text-align: center; color: #6b7280; margin-top: 20px;">No hay carreras solicitadas en este momento.</p>';
            return;
        }

        snapshot.forEach((docSnapshot) => {
            const trip = docSnapshot.data();
            const tripId = docSnapshot.id;

            const card = document.createElement('div');
            card.className = 'trip-card';
            card.innerHTML = `
                <div class="trip-header">
                    <strong>Carrera ${trip.tipoCarrera}</strong>
                    <span class="badge">${trip.pago}</span>
                </div>
                <p>📍 <strong>Ubicación:</strong> ${trip.ubicacion}</p>
                <button class="btn-accept" id="btn-${tripId}">ACEPTAR CARRERA</button>
            `;

            container.appendChild(card);

            document.getElementById(`btn-${tripId}`).addEventListener('click', () => aceptarCarrera(tripId, trip));
        });
    });

    async function aceptarCarrera(tripId, trip) {
        try {
            await updateDoc(doc(db, "viajes", tripId), {
                estado: "ACEPTADO",
                conductor: miPerfil
            });

            mostrarMapaYDetalles(trip, tripId);
        } catch (error) {
            console.error("Error al aceptar carrera:", error);
            alert("No se pudo aceptar la carrera.");
        }
    }

    function mostrarMapaYDetalles(trip, tripId) {
        const container = document.getElementById('trips-container');
        
        // Coordenadas recibidas del cliente (o las por defecto si no marcó)
        const lat = trip.coordenadas ? trip.coordenadas.lat : 7.6441;
        const lng = trip.coordenadas ? trip.coordenadas.lng : -72.2858;

        // Enlace directo a Google Maps para navegación GPS giro a giro
        const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;

        container.innerHTML = `
            <div class="trip-card">
                <div class="trip-header">
                    <strong style="color: #10b981;">¡CARRERA EN CURSO!</strong>
                    <span class="badge">${trip.pago}</span>
                </div>
                <p>📍 <strong>Referencia:</strong> ${trip.ubicacion}</p>
                
                <!-- Mapa de la ubicación del cliente -->
                <div id="driver-map"></div>

                <!-- Botón de GPS -->
                <a href="${googleMapsUrl}" target="_blank" class="btn-gps">🧭 ABRIR EN GOOGLE MAPS GPS</a>
                
                <button class="btn-finish" id="btn-finish">FINALIZAR CARRERA</button>
            </div>
        `;

        // Renderizar mapa
        activeMap = L.map('driver-map').setView([lat, lng], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(activeMap);

        // Marcador del cliente
        L.marker([lat, lng]).addTo(activeMap)
            .bindPopup(`Cliente: ${trip.ubicacion}`)
            .openPopup();

        setTimeout(() => { activeMap.invalidateSize(); }, 200);

        document.getElementById('btn-finish').addEventListener('click', async () => {
            await updateDoc(doc(db, "viajes", tripId), { estado: "FINALIZADO" });
            location.reload();
        });
    }
</script>

</body>
</html>
